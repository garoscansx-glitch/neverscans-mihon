name: Build NeverScans Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout Keiyoushi extensions-source
        uses: actions/checkout@v4
        with:
          repository: keiyoushi/extensions-source
          path: extensions-source

      - name: Copy NeverScans into extensions-source
        run: |
          mkdir -p extensions-source/src/ar/neverscans/src/eu/kanade/tachiyomi/extension/ar/neverscans
          cp src/ar/neverscans/build.gradle extensions-source/src/ar/neverscans/build.gradle
          cp src/ar/neverscans/AndroidManifest.xml extensions-source/src/ar/neverscans/AndroidManifest.xml
          cp src/ar/neverscans/src/eu/kanade/tachiyomi/extension/ar/neverscans/NeverScans.kt extensions-source/src/ar/neverscans/src/eu/kanade/tachiyomi/extension/ar/neverscans/NeverScans.kt

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix formatting and Build APK
        working-directory: extensions-source
        run: ./gradlew :src:ar:neverscans:spotlessApply :src:ar:neverscans:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeverScans-APK
          path: extensions-source/src/ar/neverscans/build/outputs/apk/debug/*.apk
